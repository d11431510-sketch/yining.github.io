<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouBike 2.0 即時地圖儀表板</title>
    <!-- 使用 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --primary-yellow: #fff9e6; /* 淡淡的鵝黃色背景 */
            --accent-yellow: #f7ca18;  /* YouBike 經典黃 */
            --secondary-color: #2c3e50;
            --accent-orange: #e67e22;
            --card-bg: #ffffff;
            --text-main: #4a4a4a;
            --text-light: #888888;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--primary-yellow);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--secondary-color);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1rem;
        }

        .action-area {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        #fetch-btn {
            background-color: var(--accent-yellow);
            color: var(--secondary-color);
        }

        #fetch-btn:hover {
            transform: translateY(-2px);
            background-color: #fdd835;
        }

        #reset-btn {
            background-color: #ffffff;
            color: var(--secondary-color);
            border: 2px solid #bdc3c7;
        }

        #reset-btn:hover {
            background-color: #ecf0f1;
            border-color: #95a5a6;
            transform: translateY(-2px);
        }

        /* 地圖區域 */
        #map {
            height: 450px;
            width: 100%;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 4px solid white;
            z-index: 1;
        }

        /* 儀表板卡片 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
        }

        .dashboard-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .station-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            transition: var(--transition);
            box-shadow: var(--shadow);
            border: 1px solid rgba(247, 202, 24, 0.1);
        }

        .station-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        .station-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--secondary-color);
            margin-bottom: 15px;
            display: block;
            border-bottom: 2px solid var(--primary-yellow);
            padding-bottom: 8px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .info-label {
            color: var(--text-light);
            font-size: 0.85rem;
            font-family: monospace;
            text-transform: uppercase;
        }

        .info-value {
            font-weight: 600;
        }

        .bike-count {
            color: var(--accent-orange);
            font-size: 1.6rem;
            font-weight: 700;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-on { background: #e8f5e9; color: #2e7d32; }
        .status-off { background: #ffebee; color: #c62828; }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #fff;
            border-top: 4px solid var(--accent-yellow);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            #map { height: 300px; }
            h1 { font-size: 1.6rem; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>YouBike 2.0 即時地圖儀表板</h1>
            <p class="subtitle">台北市政府開放資料：呈現前 5 筆最新站點資訊</p>
        </header>

        <div class="action-area">
            <button id="fetch-btn" class="btn">🔄 更新即時資料</button>
            <button id="reset-btn" class="btn">🏠 回到原始位置</button>
            <div class="loader" id="loader"></div>
        </div>

        <!-- 地圖容器 -->
        <div id="map"></div>

        <!-- 數據卡片區域 -->
        <div id="dashboard" class="dashboard-grid"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const fetchBtn = document.getElementById('fetch-btn');
        const resetBtn = document.getElementById('reset-btn');
        const dashboard = document.getElementById('dashboard');
        const loader = document.getElementById('loader');

        let map;
        let markersLayer = L.layerGroup();
        let currentStationBounds = []; // 儲存站點的經緯度範圍

        // 初始化地圖
        function initMap() {
            try {
                map = L.map('map').setView([25.0408, 121.5165], 14);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);
                markersLayer.addTo(map);
            } catch (e) {
                console.error("地圖初始化失敗:", e);
            }
        }

        function formatStationName(name) {
            return name ? name.replace('YouBike2.0_', '') : '未知站點';
        }

        function renderContent(data) {
            if (!Array.isArray(data)) return;

            dashboard.innerHTML = '';
            markersLayer.clearLayers();
            currentStationBounds = [];
            
            const topFive = data.slice(0, 5);

            topFive.forEach((item) => {
                const lat = item.lat || item.latitude;
                const lng = item.lng || item.longitude;

                if (lat !== undefined && lng !== undefined) {
                    const card = document.createElement('div');
                    card.className = 'station-card';
                    const statusClass = item.act === "1" ? 'status-on' : 'status-off';
                    const statusText = item.act === "1" ? '正常營運' : '暫停營運';
                    
                    card.innerHTML = `
                        <span class="station-name">${formatStationName(item.sna)}</span>
                        <div class="info-row">
                            <span class="info-label">區域 (Area)</span>
                            <span class="info-value">${item.sarea || 'N/A'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">available_rent_bikes</span>
                            <span class="bike-count">${item.sbi || 0}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Quantity</span>
                            <span class="info-value">${item.tot || 0}</span>
                        </div>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    `;
                    dashboard.appendChild(card);

                    try {
                        const marker = L.marker([lat, lng])
                            .bindPopup(`<b>${formatStationName(item.sna)}</b><br>可借：${item.sbi} / 總量：${item.tot}`);
                        markersLayer.addLayer(marker);
                        currentStationBounds.push([lat, lng]);
                    } catch (e) {
                        console.warn("標記建立失敗:", item.sna, e);
                    }
                }
            });

            resetToOriginalView();
            dashboard.classList.add('visible');
        }

        // 回到站點原始位置視角
        function resetToOriginalView() {
            if (currentStationBounds.length > 0 && map) {
                map.fitBounds(currentStationBounds, { padding: [50, 50] });
            }
        }

        async function fetchData() {
            fetchBtn.disabled = true;
            loader.style.display = 'block';
            dashboard.classList.remove('visible');

            try {
                const API_URL = 'https://tcgbusfs.blob.core.windows.net/dotapp/youbike/v2/youbike_immediate.json';
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API 回應錯誤');
                const data = await response.json();
                
                setTimeout(() => {
                    renderContent(data);
                    loader.style.display = 'none';
                    fetchBtn.disabled = false;
                }, 300);
            } catch (error) {
                console.error('資料獲取失敗:', error);
                alert('無法取得資料，請檢查網路連線。');
                loader.style.display = 'none';
                fetchBtn.disabled = false;
            }
        }

        window.onload = () => {
            initMap();
            fetchData();
        };

        fetchBtn.addEventListener('click', fetchData);
        resetBtn.addEventListener('click', resetToOriginalView);
    </script>
</body>
</html>
